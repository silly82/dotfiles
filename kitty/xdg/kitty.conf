# =========================================================
# kitty — Hard Neon Pink (angeglichen an Ghostty, macOS)
# Farben: dark-theme.auto.conf / light-theme.auto.conf (OS Light/Dark)
# =========================================================

# ---------- Font (wie Ghostty app-support/config) ----------
font_family      JetBrains Mono
font_size        15.0
bold_font        auto
italic_font      auto
bold_italic_font auto
disable_ligatures never

# ---------- Window / Padding (wie Ghostty) ----------
window_padding_width  14
remember_window_size  yes
dynamic_background_opacity yes
macos_titlebar_color  background
macos_option_as_alt   both

# Versteckt Mauszeichen beim Tippen (näher an copy-on-select-UX von Ghostty)
mouse_hide_wait -1

# ---------- Tabs (Rahmen; konkrete Farben in *-theme.auto.conf) ----------
tab_bar_style         powerline
tab_powerline_style   angled

# ---------- Tastatur ----------
kitty_mod ctrl+shift
map kitty_mod+t new_tab
map kitty_mod+enter new_window
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+w close_tab

# ---------- SSH / tmux / Kompatibilität ----------
term                 xterm-256color
scrollback_lines     25000
clipboard_control    write-clipboard write-primary
sync_to_monitor      no
repaint_delay        8
input_delay          0
